<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <title>The two printable workflows: print the shells, or print the positive</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#8a94a6"/>
    </marker>
    <pattern id="plaster" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#cfc9bb"/>
      <circle cx="2" cy="2" r="0.6" fill="#b4ad9d"/>
      <circle cx="5" cy="4" r="0.6" fill="#b4ad9d"/>
    </pattern>
  </defs>

  <style>
    .h  { font-size: 15px; font-weight: 650; fill: #8a94a6; letter-spacing: .04em; }
    .t  { font-size: 12px; fill: #8a94a6; }
    .s  { font-size: 11px; fill: #9aa3b2; }
    .n  { font-size: 11px; font-weight: 700; fill: #3f7fd8; }
    .print { fill: #3f7fd8; fill-opacity: .85; stroke: #2f66b0; stroke-width: 1.2; }
    .part  { fill: #8a94a6; fill-opacity: .55; stroke: #6f7889; stroke-width: 1.2; }
    .rule  { stroke: #8a94a6; stroke-opacity: .3; stroke-width: 1; }
  </style>

  <!-- ================= MODE B : print the shells ================= -->
  <text class="h" x="24" y="26">B &#183; PRINT THE SHELLS</text>
  <text class="s" x="24" y="44">Pour plaster IN. Reusable: print once, cast many molds.</text>

  <!-- 1. printed tray with the part as a raised core -->
  <g transform="translate(30,80)">
    <path class="print" d="M0 90 L0 30 L110 30 L110 90 Z" fill="none" stroke="#2f66b0" stroke-width="0"/>
    <!-- tray walls + floor -->
    <path class="print" d="M0 30 L12 30 L12 78 L98 78 L98 30 L110 30 L110 90 L0 90 Z"/>
    <!-- the part, standing on the floor as a core -->
    <path class="part" d="M40 78 C40 50 44 40 46 34 L64 34 C66 40 70 50 70 78 Z"/>
    <!-- registration cone on the floor -->
    <path class="print" d="M20 78 L24 70 L30 70 L34 78 Z"/>
    <text class="t" x="55" y="112" text-anchor="middle">printed tray</text>
    <text class="s" x="55" y="126" text-anchor="middle">part = raised core</text>
  </g>

  <line class="rule" x1="155" y1="140" x2="185" y2="140" marker-end="url(#arrow)"/>

  <!-- 2. plaster poured in -->
  <g transform="translate(195,80)">
    <path class="print" d="M0 30 L12 30 L12 78 L98 78 L98 30 L110 30 L110 90 L0 90 Z"/>
    <path d="M12 30 L98 30 L98 78 L12 78 Z" fill="url(#plaster)"/>
    <path class="part" d="M40 78 C40 50 44 40 46 34 L64 34 C66 40 70 50 70 78 Z"/>
    <path class="print" d="M20 78 L24 70 L30 70 L34 78 Z"/>
    <text class="t" x="55" y="112" text-anchor="middle">pour plaster in</text>
    <text class="s" x="55" y="126" text-anchor="middle">screed level, wait</text>
  </g>

  <line class="rule" x1="320" y1="140" x2="350" y2="140" marker-end="url(#arrow)"/>

  <!-- 3. the plaster mold half -->
  <g transform="translate(360,80)">
    <path d="M0 30 L86 30 L86 78 L0 78 Z" fill="url(#plaster)" stroke="#b4ad9d" stroke-width="1.2"/>
    <!-- cavity impression -->
    <path d="M28 78 C28 50 32 40 34 34 L52 34 C54 40 58 50 58 78 Z" fill="#0f1115" fill-opacity=".12" stroke="#b4ad9d" stroke-width="1"/>
    <!-- socket -->
    <path d="M8 78 L12 70 L18 70 L22 78 Z" fill="#0f1115" fill-opacity=".12" stroke="#b4ad9d" stroke-width="1"/>
    <text class="t" x="43" y="112" text-anchor="middle">plaster half</text>
    <text class="s" x="43" y="126" text-anchor="middle">flat + keyed, free</text>
  </g>

  <line class="rule" x1="30" y1="230" x2="850" y2="230" stroke-dasharray="4 4"/>

  <!-- ================= MODE A : print the positive ================= -->
  <text class="h" x="24" y="266">A &#183; PRINT THE POSITIVE</text>
  <text class="s" x="24" y="284">Pour plaster AROUND it. The traditional route, minus the clay bedding.</text>

  <g transform="translate(30,300)">
    <!-- bed plate with the part through it -->
    <path class="print" d="M0 30 L46 30 L46 24 L64 24 L64 30 L110 30 L110 40 L0 40 Z"/>
    <path class="part" d="M40 24 C40 -4 44 -14 46 -20 L64 -20 C66 -14 70 -4 70 24 Z"/>
    <path class="print" d="M18 30 L22 22 L28 22 L32 30 Z"/>
    <text class="t" x="55" y="60" text-anchor="middle">bed plate</text>
  </g>

  <line class="rule" x1="155" y1="330" x2="185" y2="330" marker-end="url(#arrow)"/>

  <g transform="translate(195,300)">
    <path class="print" d="M0 -30 L8 -30 L8 40 L0 40 Z"/>
    <path class="print" d="M102 -30 L110 -30 L110 40 L102 40 Z"/>
    <path d="M8 -30 L102 -30 L102 30 L8 30 Z" fill="url(#plaster)"/>
    <path class="print" d="M8 30 L46 30 L46 24 L64 24 L64 30 L102 30 L102 40 L8 40 Z"/>
    <path class="part" d="M40 24 C40 -4 44 -14 46 -20 L64 -20 C66 -14 70 -4 70 24 Z"/>
    <text class="t" x="55" y="60" text-anchor="middle">cottle + pour</text>
  </g>

  <line class="rule" x1="320" y1="330" x2="350" y2="330" marker-end="url(#arrow)"/>

  <g transform="translate(360,300)">
    <path d="M0 -30 L94 -30 L94 30 L0 30 Z" fill="url(#plaster)" stroke="#b4ad9d" stroke-width="1.2"/>
    <path d="M32 30 C32 2 36 -8 38 -14 L56 -14 C58 -8 62 2 62 30 Z" fill="#0f1115" fill-opacity=".12" stroke="#b4ad9d"/>
    <text class="t" x="47" y="60" text-anchor="middle">flip, soap, pour half two</text>
  </g>

  <!-- key -->
  <g transform="translate(600,80)">
    <rect x="0" y="0" width="250" height="120" rx="6" fill="none" stroke="#8a94a6" stroke-opacity=".25"/>
    <rect x="14" y="18" width="16" height="12" class="print"/>
    <text class="s" x="40" y="28">3D printed — you make this</text>
    <rect x="14" y="46" width="16" height="12" fill="url(#plaster)" stroke="#b4ad9d"/>
    <text class="s" x="40" y="56">plaster — the mold itself</text>
    <rect x="14" y="74" width="16" height="12" class="part"/>
    <text class="s" x="40" y="84">your part, scaled for shrinkage</text>
    <text class="s" x="14" y="106" fill="#8a94a6">Both start from the same geometry.</text>
  </g>
</svg>
