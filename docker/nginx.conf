server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WASM must be served with the right type or browsers refuse to stream-compile it.
    types {
        application/wasm wasm;
    }
    include /etc/nginx/mime.types;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml model/gltf-binary;
    gzip_min_length 1024;

    # Hashed assets are immutable; the shell must never be cached stale.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
